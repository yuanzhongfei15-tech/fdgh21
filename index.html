</head>

            { category: "情感文案", content: "真正爱你的人，会在你容貌尚好的时候爱你，会在你青春正盛的时候爱你，会在你风华正茂的时候爱你。而不是等你老了、丑了、胖了再来说爱你。", tags: "真心 · 陪伴" },
            { category: "情感文案", content: "感情里最让人成长的地方，大概就是：你明明那么喜欢他，却还是要假装不在乎。你明明想他了，却还是不肯先主动。", tags: "成长 · 倔强" },
            { category: "情感文案", content: "所有的分离，都是为了更好的相聚。如果此刻我们必须分开，那就让我们带着彼此的祝福，各自安好。", tags: "分离 · 祝福" },
            { category: "情感文案", content: "在这个快餐感情的年代，我愿意做一个慢一点的人。慢慢喜欢你，慢慢靠近你，慢慢陪你走完这一生。", tags: "慢热 · 专一" },
            { category: "情感文案", content: "后来我才知道，那些真正要走的人，吝啬得连说再见都觉得是浪费时间。而那些嚷着要离开的人，不过是想要你挽留一下。", tags: "真假 · 挽留" },
            { category: "情感文案", content: "如果一个人说喜欢你，请等他的行动，而不是只听他的承诺。真正的爱，从来都不是说说而已。", tags: "行动 · 承诺" },

            { category: "励志文案", content: "没有人能替你承受痛苦，也没有人能抢走你的坚强。请你相信，每一个清晨的坚持，都不会被辜负。", tags: "坚持 · 坚强" },
            { category: "励志文案", content: "当你又忙又美，何惧患得患失。把自己活成一道光，潇洒且硬气地穿行在这个世界上。", tags: "独立 · 强大" },
            { category: "励志文案", content: "不要在该奋斗的年纪选择安逸，不要在最能吃苦的时候选择逃避。吃的苦中苦，方为人上人。", tags: "奋斗 · 吃苦" },
            { category: "励志文案", content: "人生没有白走的路，每一步都算数。那些看似曲折的弯路，终将把你带到你想去的地方。", tags: "成长 · 积累" },
            { category: "励志文案", content: "你所谓的迷茫，不过是清醒地看着自己沉沦。请保持清醒，保持努力，保持对生活的热爱。", tags: "清醒 · 努力" },
            { category: "励志文案", content: "不要抱怨生活对你不公平，因为生活根本不知道你是谁。与其抱怨，不如改变；改变不了，不如接受。", tags: "改变 · 接受" },
            { category: "励志文案", content: "成功的路上并不拥挤，因为坚持下来的人并不多。熬过无人问津的日子，才能迎来诗和远方。", tags: "坚持 · 成功" },
            { category: "励志文案", content: "当你停下脚步的时候，别忘了别人还在奔跑。请记住：比你优秀的人，比你更努力。", tags: "努力 · 奔跑" },
            { category: "励志文案", content: "你有多自律，就有多自由。自律不是为了约束自己，而是为了遇见更好的自己。", tags: "自律 · 自由" },
            { category: "励志文案", content: "别让平凡的生活耗尽你所有的向往。去追去闯去乘风破浪，你永远比自己想象的要强大。", tags: "向往 · 强大" },
            { category: "励志文案", content: "人生就像一杯茶，不会苦一辈子，但总会苦一阵子。挺过去了，你就能品到生活的甘甜。", tags: "坚持 · 希望" },
            { category: "励志文案", content: "今天很残酷，明天更残酷，后天很美好，但绝大多数人死在明天晚上。认准目标，永不放弃。", tags: "坚持 · 目标" },

            { category: "朋友圈文案", content: "生活不是攀比，而是知足。珍惜当下，感恩拥有，就是最简单的幸福。", tags: "知足 · 感恩" },
            { category: "朋友圈文案", content: "今天的不开心就到此为止吧，明天依旧要光芒万丈啊。晚安，世界。", tags: "释怀 · 晚安" },
            { category: "朋友圈文案", content: "偷得浮生半日闲，享受这难得的宁静时刻。一杯茶，一本书，一个下午。", tags: "悠闲 · 时光" },
            { category: "朋友圈文案", content: "年龄只是数字，状态才是王道。无论多少岁，都要做一个眼里有光、心里有梦的人。", tags: "年龄 · 心态" },
            { category: "朋友圈文案", content: "把平凡的日子过成诗，在琐碎的生活里寻找光。每一天都值得被认真对待。", tags: "平凡 · 热爱" },
            { category: "朋友圈文案", content: "有些路，注定要一个人走。但请相信，所有的孤独，都会以另一种方式回报你。", tags: "孤独 · 成长" },
            { category: "朋友圈文案", content: "新的一天，新的开始。不念过去，不畏将来，活在当下，便是最好的状态。", tags: "当下 · 出发" },
            { category: "朋友圈文案", content: "生活就像海洋，只有意志坚强的人才能到达彼岸。愿我们都能乘风破浪，勇往直前。", tags: "坚强 · 前进" },
            { category: "朋友圈文案", content: "今天风很轻，阳光很暖，日子很平凡，但心里很满足。这就是我想要的生活。", tags: "满足 · 简单" },
            { category: "朋友圈文案", content: "与自己和解，与世界和平相处。不再较真，不再执着，接受所有的不完美。", tags: "和解 · 平和" },

            { category: "爆款标题", content: "男人最想娶的3种女人，有你吗？", tags: "情感 · 话题" },
            { category: "爆款标题", content: "真正厉害的人，都懂得这5条潜规则", tags: "人情世故 · 规则" },

            { category: "古风短句", content: "既见君子，云胡不喜。", tags: "诗经 · 喜悦" },
            { category: "古风短句", content: "山有木兮木有枝，心悦君兮君不知。", tags: "越人歌 · 暗恋" },
            { category: "古风短句", content: "曾经沧海难为水，除却巫山不是云。", tags: "元稹 · 深情" },
            { category: "古风短句", content: "入目无他人，四下皆是你。", tags: "情感 · 专一" },
            { category: "古风短句", content: "纵你阅人何其多，始终无人恰似我。", tags: "情感 · 独特" },
            { category: "古风短句", content: "听风与风窃窃私语，诉说着我们的故事。", tags: "浪漫 · 唯美" },
            { category: "古风短句", content: "愿你历尽千帆，归来仍是少年。", tags: "祝愿 · 初心" },
            { category: "古风短句", content: "人生若只如初见，何事秋风悲画扇。", tags: "纳兰 · 感慨" },
            { category: "古风短句", content: "执子之手，与子偕老。", tags: "诗经 · 承诺" },
            { category: "古风短句", content: "愿我如星君如月，夜夜流光相皎洁。", tags: "范成大 · 相思" },
            { category: "古风短句", content: "众里寻他千百度，蓦然回首，那人却在灯火阑珊处。", tags: "辛弃疾 · 缘分" },
            { category: "古风短句", content: "两情若是久长时，又岂在朝朝暮暮。", tags: "秦观 · 真爱" },

            { category: "搞笑文案", content: "早起毁一天，所以我选择睡到中午。", tags: "睡眠 · 调侃" },
            { category: "搞笑文案", content: "别减肥了，你丑又不是因为你胖。", tags: "自嘲 · 幽默" },
            { category: "搞笑文案", content: "我已经不是那个花五十块都要考虑很久的女人了，我现在是花五块都要深思熟虑的抠门女人。", tags: "省钱 · 自嘲" },
            { category: "搞笑文案", content: "谁说寸金难买寸光阴，明明是光阴对我爱答不理。", tags: "时间 · 调侃" },
            { category: "搞笑文案", content: "明明可以靠脸吃饭，我却偏偏要工作，这是不是傻？", tags: "颜值 · 调侃" },
            { category: "搞笑文案", content: "如果你看到这篇文章，说明你正在发呆，想什么呢？", tags: "互动 · 调侃" },
            { category: "搞笑文案", content: "运动手表：今日步数188，恭喜你已经超越了0%的用户。我：你是在嘲笑我吗？", tags: "运动 · 步数" },
            { category: "搞笑文案", content: "小时候家里穷，长大后更穷了，这叫什么？这叫传承。", tags: "贫穷 · 幽默" },
            { category: "搞笑文案", content: "别人琴棋书画样样精通，我琴棋书画样样稀松。", tags: "技能 · 自嘲" },
            { category: "搞笑文案", content: "我上辈子一定是道数学题，因为太难了，这辈子做不好。", tags: "数学 · 自嘲" },
            { category: "搞笑文案", content: "只要坚持，每一个困难都能打败我。", tags: "困难 · 反转" },
            { category: "搞笑文案", content: "你说的“不瘦不换头像”，已经换了八个头像了吧？", tags: "减肥 · 调侃" }
        ];

        let currentCategory = 'all';
        let searchQuery = '';
        let favorites = JSON.parse(localStorage.getItem('favorites')) || [];
        let showOnlyFavorites = false;

        const cardContainer = document.getElementById('cardContainer');
        const searchInput = document.getElementById('searchInput');
        const categoryFilters = document.getElementById('categoryFilters');
        const displayCount = document.getElementById('displayCount');
        const totalCount = document.getElementById('totalCount');
        const favoritesCount = document.getElementById('favoritesCount');
        const emptyState = document.getElementById('emptyState');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');
        const randomBtn = document.getElementById('randomBtn');
        const copyAllBtn = document.getElementById('copyAllBtn');
        const favoritesFilter = document.getElementById('favoritesFilter');

        function init() {
            totalCount.textContent = copyData.length;
            updateFavoritesCount();
            renderCards();
            bindEvents();
        }

        function bindEvents() {
            searchInput.addEventListener('input', debounce(handleSearch, 300));
            
            categoryFilters.addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-btn')) {
                    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    currentCategory = e.target.dataset.category;
                    renderCards();
                }
            });

            randomBtn.addEventListener('click', handleRandom);
            copyAllBtn.addEventListener('click', handleCopyAll);
            favoritesFilter.addEventListener('click', handleFavoritesFilter);
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function handleSearch(e) {
            searchQuery = e.target.value.trim().toLowerCase();
            renderCards();
        }

        function handleRandom() {
            randomBtn.classList.add('pulse');
            setTimeout(() => randomBtn.classList.remove('pulse'), 300);
            
            const filteredData = getFilteredData();
            if (filteredData.length === 0) return;
            
            const randomIndex = Math.floor(Math.random() * filteredData.length);
            const randomCard = document.querySelectorAll('.card')[randomIndex];
            if (randomCard) {
                randomCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
                randomCard.style.animation = 'none';
                randomCard.offsetHeight;
                randomCard.style.animation = 'fadeIn 0.5s ease forwards';
            }
        }

        function handleCopyAll() {
            const filteredData = getFilteredData();
            if (filteredData.length === 0) {
                showToast('没有可复制的内容', false);
                return;
            }
            
            const text = filteredData.map(item => `【${item.category}】\n${item.content}`).join('\n\n');
            copyToClipboard(text);
            showToast(`已复制 ${filteredData.length} 条文案`, true);
        }

        function handleFavoritesFilter() {
            showOnlyFavorites = !showOnlyFavorites;
            favoritesFilter.classList.toggle('active', showOnlyFavorites);
            favoritesFilter.style.background = showOnlyFavorites ? 'var(--primary)' : '';
            favoritesFilter.style.borderColor = showOnlyFavorites ? 'var(--primary)' : '';
            renderCards();
        }

        function getFilteredData() {
            return copyData.filter(item => {
                const matchCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchSearch = !searchQuery || 
                    item.content.toLowerCase().includes(searchQuery) || 
                    item.category.toLowerCase().includes(searchQuery) ||
                    item.tags.toLowerCase().includes(searchQuery);
                const matchFavorites = !showOnlyFavorites || favorites.includes(item.content);
                return matchCategory && matchSearch && matchFavorites;
            });
        }

        function renderCards() {
            const filteredData = getFilteredData();
            displayCount.textContent = filteredData.length;
            
            if (filteredData.length === 0) {
                cardContainer.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            cardContainer.innerHTML = filteredData.map((item, index) => `
                <article class="card" role="listitem" style="animation-delay: ${index * 0.05}s">
                    <span class="card-category">${item.category}</span>
                    <p class="card-content">${item.content}</p>
                    <div class="card-footer">
                        <span class="card-tag">${item.tags}</span>
                        <div class="card-actions">
                            <button class="card-btn copy-btn" data-content="${item.content}" title="复制文案" aria-label="复制文案">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                    <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                                </svg>
                            </button>
                            <button class="card-btn favorite-btn ${favorites.includes(item.content) ? 'active' : ''}" data-content="${item.content}" title="${favorites.includes(item.content) ? '取消收藏' : '收藏'}" aria-label="${favorites.includes(item.content) ? '取消收藏' : '收藏'}">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="${favorites.includes(item.content) ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </article>
            `).join('');

            document.querySelectorAll('.copy-btn').forEach(btn => {
                btn.addEventListener('click', handleCopy);
            });

            document.querySelectorAll('.favorite-btn').forEach(btn => {
                btn.addEventListener('click', handleFavorite);
            });
        }

        function handleCopy(e) {
            const btn = e.currentTarget;
            const content = btn.dataset.content;
            copyToClipboard(content);
            
            btn.classList.add('copied');
            setTimeout(() => btn.classList.remove('copied'), 1500);
            
            showToast('复制成功', true);
        }

        function handleFavorite(e) {
            const btn = e.currentTarget;
            const content = btn.dataset.content;
            const isFavorite = favorites.includes(content);
            
            if (isFavorite) {
                favorites = favorites.filter(f => f !== content);
                btn.classList.remove('active');
                btn.querySelector('svg').setAttribute('fill', 'none');
            } else {
                favorites.push(content);
                btn.classList.add('active');
                btn.querySelector('svg').setAttribute('fill', 'currentColor');
            }
            
            localStorage.setItem('favorites', JSON.stringify(favorites));
            updateFavoritesCount();
            
            if (showOnlyFavorites) {
                renderCards();
            }
            
            showToast(isFavorite ? '已取消收藏' : '已添加收藏', true);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
            }
        }

        function showToast(message, success = true) {
            toastMessage.textContent = message;
            toast.className = 'toast' + (success ? ' success' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateFavoritesCount() {
            favoritesCount.textContent = favorites.length;
        }

        init();
    </script>
</body>
</html>
